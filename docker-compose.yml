version: "3.8"

services:
  # 🚀 FastAPI Backend (API)
  backend:
    build:
      context: ./python_backend
      dockerfile: Dockerfile
    container_name: nexus_backend_api
    ports:
      - "8000:8000"
    env_file:
      - ./python_backend/.env
    depends_on:
      - redis_db
    volumes:
      - temp_pdf_data:/tmp
    networks:
      - nexus_network

  # 🤖 Celery Worker (AI İşlemleri)
  worker:
    build:
      context: ./python_backend
      dockerfile: Dockerfile
    container_name: nexus_worker
    command: celery -A app.core.celery_app worker --loglevel=info
    env_file:
      - ./python_backend/.env
    depends_on:
      - redis_db
    volumes:
      - temp_pdf_data:/tmp
    networks:
      - nexus_network

  # ⚡ Redis
  redis_db:
    image: redis:7-alpine
    container_name: nexus_redis
    ports:
      - "6379:6379"
    networks:
      - nexus_network

  # 🎨 React Frontend
  frontend:
    build:
      context: ./ai-pdf-frontend
      dockerfile: Dockerfile
    container_name: nexus_frontend
    ports:
      - "5173:80"
    volumes:
      - ./default.conf:/etc/nginx/conf.d/default.conf:ro # PROXY AYARI BURADA
    depends_on:
      - backend
    networks:
      - nexus_network

networks:
  nexus_network:
    driver: bridge

volumes:
  redis_data:
  temp_pdf_data: