server {
    listen 80;
    server_name localhost;

    # 1. DOSYA BOYUTU AYARLARI
    # PDF yüklemeleri için 20MB güvenli bir sınırdır.
    client_max_body_size 20M;
    client_body_buffer_size 10M;

    # 2. TIMEOUT (ZAMAN AŞIMI) AYARLARI
    # AI işlemlerinin (Llama/Embedding) sürebileceği ihtimaline karşı 300s (5 dk) idealdir.
    proxy_connect_timeout 300s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;
    send_timeout 300s;

    # 3. BUFFERING (ÖN BELLEKLEME) KAPATMA
    # "Pending" hatasını çözen, dosyanın doğrudan akmasını sağlayan kritik ayarlar.
    proxy_request_buffering off;
    proxy_buffering off;

    # 4. FRONTEND STATİK DOSYALAR (Next.js /out klasörü)
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        # Sayfa yenilendiğinde 404 almamak için yönlendirme:
        try_files $uri $uri/ /index.html;
    }

    # 5. BACKEND API YÖNLENDİRMESİ
    # Frontend'den /api/v1/ ile başlayan her şey buraya gelir.
    location /api/v1/ {
        # 'backend' ismi docker-compose içindeki servis adıdır.
        proxy_pass http://backend:8000;
        
        # Orijinal Header bilgilerini koru
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket ve Modern HTTP desteği
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Hata sayfası yönetimi
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}