server {
    listen 80;
    server_name localhost;

    # 1. DOSYA BOYUTU AYARLARI
    # 10MB limitin için 20MB güvenli bir sınırdır.
    client_max_body_size 20M;
    # Büyük dosyalar için bellek kullanımını optimize eder.
    client_body_buffer_size 10M;

    # 2. TIMEOUT (ZAMAN AŞIMI) AYARLARI
    # Özellikle büyük dosya yüklerken Nginx'in bağlantıyı kesmesini engeller.
    proxy_connect_timeout 300s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;
    send_timeout 300s;

    # 3. BUFFERING (ÖN BELLEKLEME) KAPATMA
    # Dosyanın Nginx'te bekletilmeden doğrudan Backend'e akmasını sağlar.
    # "Pending" hatasını çözen en kritik ayarlar bunlardır.
    proxy_request_buffering off;
    proxy_buffering off;

    # 4. FRONTEND STATİK DOSYALAR
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        # React/Next.js Routing için gerekli (sayfa yenileyince 404 almamak için)
        try_files $uri $uri/ /index.html;
    }

    # 5. BACKEND API YÖNLENDİRMESİ
    location /api/v1/ {
        # 'backend' burada docker-compose.yml içindeki servis adıdır.
        proxy_pass http://backend:8000;
        
        # Header bilgilerini backend'e doğru şekilde iletir.
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket desteği (eğer ileride eklemek istersen)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Hata sayfaları (opsiyonel ama profesyonellik katar)
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}